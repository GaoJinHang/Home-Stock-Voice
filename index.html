<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Home Stock Voice</title>
  <style>
    :root {
      --bg: #f6f7f2;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #667085;
      --border: #e4e7ec;
      --primary: #1f7a4d;
      --primary-dark: #155f3b;
      --danger: #c0392b;
      --warn: #b7791f;
      --ok: #2f855a;
      --shadow: 0 10px 30px rgba(16, 24, 40, 0.08);
      --radius: 20px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      min-height: 48px;
      cursor: pointer;
      background: #edf2f7;
      color: var(--text);
      font-weight: 700;
    }

    button.primary {
      background: var(--primary);
      color: #fff;
    }

    button.primary:active, button.primary:hover { background: var(--primary-dark); }

    button.danger {
      background: #fff1f0;
      color: var(--danger);
    }

    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
    }

    button.small {
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      min-height: 48px;
      padding: 12px 14px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31, 122, 77, 0.12);
    }

    textarea {
      min-height: 88px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .app-shell {
      max-width: 920px;
      margin: 0 auto;
      padding: 16px 14px 92px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -16px -14px 16px;
      padding: 14px 14px 12px;
      background: rgba(246, 247, 242, 0.94);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(228, 231, 236, 0.8);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1f7a4d, #79b473);
      display: grid;
      place-items: center;
      color: white;
      box-shadow: var(--shadow);
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .section {
      display: none;
      animation: fade .16s ease-out;
    }

    .section.active { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 12px 0;
    }

    .card.tight { padding: 12px; }

    .grid {
      display: grid;
      gap: 12px;
    }

    .grid.two {
      grid-template-columns: 1fr 1fr;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row.wrap { flex-wrap: wrap; }
    .row.between { justify-content: space-between; }

    .stack { display: grid; gap: 10px; }

    .muted { color: var(--muted); }
    .tiny { font-size: 12px; }
    .small-text { font-size: 14px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 9px;
      background: #f2f4f7;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.warn { background: #fff7e6; color: var(--warn); }
    .pill.danger { background: #fff1f0; color: var(--danger); }
    .pill.ok { background: #edfdf3; color: var(--ok); }
    .pill.primary { background: #eaf7ef; color: var(--primary); }

    .quick-input {
      background: linear-gradient(180deg, #ffffff 0%, #f4fbf6 100%);
      border-color: rgba(31, 122, 77, 0.18);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .pressing {
      background: #a63d40 !important;
      color: white !important;
      transform: scale(0.99);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .summary-cell {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .summary-cell b {
      font-size: 22px;
      display: block;
    }

    .item-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .item-title h3 {
      margin: 0;
      font-size: 18px;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .batch-list {
      border-top: 1px dashed var(--border);
      margin-top: 12px;
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .batch-row, .shopping-row, .log-row {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }

    .filters {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      position: sticky;
      top: 77px;
      z-index: 7;
      background: rgba(246, 247, 242, 0.94);
      padding: 8px 0;
      backdrop-filter: blur(8px);
    }

    .checkbox-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      color: var(--text);
      font-weight: 700;
      font-size: 13px;
    }

    .checkbox-line input {
      width: 18px;
      min-height: auto;
      height: 18px;
      padding: 0;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 8px max(10px, env(safe-area-inset-left)) max(8px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-right));
    }

    .bottom-nav-inner {
      max-width: 920px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .nav-btn {
      display: grid;
      place-items: center;
      gap: 2px;
      min-height: 56px;
      padding: 6px;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .nav-btn.active {
      background: #eaf7ef;
      color: var(--primary);
    }

    .nav-icon { font-size: 20px; line-height: 1; }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      z-index: 50;
      display: none;
      align-items: flex-end;
      padding: 12px;
    }

    .modal-backdrop.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.25);
      padding: 16px;
    }

    .modal h2 { margin: 4px 0 12px; font-size: 20px; }

    .empty {
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.55);
      padding: 22px 14px;
      margin: 12px 0;
    }

    .confirm-card {
      border: 2px solid rgba(31,122,77,0.25);
      background: #fbfffc;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 82px;
      transform: translateX(-50%);
      background: #1f2933;
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      z-index: 80;
      box-shadow: var(--shadow);
      display: none;
      max-width: calc(100vw - 28px);
      text-align: center;
      font-size: 14px;
    }

    .toast.show { display: block; }

    .danger-text { color: var(--danger); }
    .warn-text { color: var(--warn); }
    .ok-text { color: var(--ok); }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: #f2f4f7;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px 6px;
      font-size: 12px;
    }

    @media (min-width: 760px) {
      .app-shell { padding-left: 22px; padding-right: 22px; }
      header { margin-left: -22px; margin-right: -22px; padding-left: 22px; padding-right: 22px; }
      .filters { grid-template-columns: 1.2fr 2fr; top: 76px; }
      .quick-actions { grid-template-columns: 1.2fr 1fr 1fr; }
      .modal-backdrop { align-items: center; }
      .modal { border-radius: 28px; }
      .grid.desktop-two { grid-template-columns: 1fr 1fr; }
      .grid.desktop-three { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="title-row">
        <div>
          <div class="brand-title"><span class="logo">🏠</span><span>Home Stock Voice</span></div>
          <div class="subtitle">手机优先的家庭库存本地小工具</div>
        </div>
        <button class="small ghost" id="undoBtn" title="撤销最近一次操作">撤销</button>
      </div>
    </header>

    <main>
      <section class="section active" id="section-home">
        <div class="card quick-input">
          <div class="row between">
            <div>
              <b>快速记录</b>
              <div class="muted tiny">先解析，再确认，最后才写入库存</div>
            </div>
            <span class="pill primary" id="speechStatus">文字输入</span>
          </div>
          <textarea id="quickText" placeholder="说一句库存变化，比如“牛奶加 2 盒”。"></textarea>
          <div class="quick-actions" id="quickActions">
            <button class="primary" id="parseBtn">解析并确认</button>
            <button id="voiceBtn" type="button">按住说话</button>
            <button class="ghost" id="clearQuickBtn" type="button">清空</button>
          </div>
          <div class="tiny muted" style="margin-top:8px;">
            可试：<span class="kbd">牛奶加 2 盒</span>、<span class="kbd">鸡蛋吃了 2 个</span>、<span class="kbd">大米还剩 3 斤</span>、<span class="kbd">牛奶 6 月 20 日过期</span>
          </div>
        </div>

        <div id="confirmArea"></div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="card">
          <div class="row between">
            <b>低库存</b>
            <button class="small ghost" data-nav="inventory" data-filter="low">查看</button>
          </div>
          <div id="homeLowStock"></div>
        </div>

        <div class="card">
          <div class="row between">
            <b>临期提醒</b>
            <button class="small ghost" data-nav="inventory" data-filter="expiring">查看</button>
          </div>
          <div id="homeExpiring"></div>
        </div>

        <div class="card">
          <div class="row between">
            <b>已过期</b>
            <button class="small ghost" data-nav="inventory" data-filter="expired">查看</button>
          </div>
          <div id="homeExpired"></div>
        </div>

        <div class="card">
          <div class="row between">
            <b>购物清单</b>
            <button class="small ghost" data-nav="shopping">管理</button>
          </div>
          <div id="homeShopping"></div>
        </div>
      </section>

      <section class="section" id="section-inventory">
        <div class="row between wrap">
          <div>
            <h2 style="margin:0;">库存列表</h2>
            <div class="muted tiny">支持分类、低库存、临期、已过期筛选</div>
          </div>
          <button class="primary" id="addItemBtn">新增物品</button>
        </div>

        <div class="filters">
          <select id="categoryFilter"></select>
          <div class="row wrap">
            <label class="checkbox-line"><input type="checkbox" id="filterLow"> 低库存</label>
            <label class="checkbox-line"><input type="checkbox" id="filterExpiring"> 临期</label>
            <label class="checkbox-line"><input type="checkbox" id="filterExpired"> 已过期</label>
          </div>
        </div>

        <div id="inventoryList"></div>
      </section>

      <section class="section" id="section-shopping">
        <div class="row between wrap">
          <div>
            <h2 style="margin:0;">购物清单</h2>
            <div class="muted tiny">低库存可自动加入，也可手动添加</div>
          </div>
          <button class="primary" id="manualShoppingBtn">手动加入</button>
        </div>
        <div id="shoppingList"></div>
      </section>

      <section class="section" id="section-logs">
        <div class="row between wrap">
          <div>
            <h2 style="margin:0;">操作日志</h2>
            <div class="muted tiny">包含原始输入、解析结果、动作、数量变化和修改人字段</div>
          </div>
          <button class="danger small" id="clearDataBtn">清空本地数据</button>
        </div>
        <div id="logsList"></div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" data-nav="home"><span class="nav-icon">🎙️</span>首页</button>
      <button class="nav-btn" data-nav="inventory"><span class="nav-icon">📦</span>库存</button>
      <button class="nav-btn" data-nav="shopping"><span class="nav-icon">🛒</span>清单</button>
      <button class="nav-btn" data-nav="logs"><span class="nav-icon">🧾</span>日志</button>
    </div>
  </nav>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "homeStockVoice.v1";
  const CATEGORIES = ["食品", "冷冻", "米面粮油", "调味品", "洗护", "清洁", "纸品", "药品", "宠物", "工具/电池", "其他"];
  const ACTION_LABELS = {
    add: "增加库存",
    reduce: "减少库存",
    setRemaining: "设置剩余",
    usedUp: "用完",
    setExpiry: "设置过期日",
    addToShopping: "加入购物清单",
    editItem: "编辑物品",
    deleteItem: "删除物品",
    addBatch: "新增批次",
    editBatch: "编辑批次",
    deleteBatch: "删除批次",
    shoppingBought: "购物清单转库存",
    undo: "撤销"
  };

  let state = loadState();
  let pendingParse = null;
  let recognition = null;
  let expandedItems = new Set();

  const $ = (selector) => document.querySelector(selector);
  const $$ = (selector) => Array.from(document.querySelectorAll(selector));

  function nowISO() {
    return new Date().toISOString();
  }

  function uid(prefix = "id") {
    return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
  }

  function todayISO() {
    const d = new Date();
    return toDateInputValue(d);
  }

  function toDateInputValue(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function clone(value) {
    return JSON.parse(JSON.stringify(value));
  }

  function normalizeName(value) {
    return String(value || "").trim().replace(/\s+/g, "").toLowerCase();
  }

  function asNumber(value, fallback = 0) {
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function formatQty(n) {
    const value = asNumber(n, 0);
    return Number.isInteger(value) ? String(value) : value.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
  }

  function loadState() {
    const fallback = {
      schemaVersion: 1,
      householdId: "local-household",
      userId: "local-user",
      items: [],
      shoppingList: [],
      logs: [],
      createdAt: nowISO(),
      updatedAt: nowISO()
    };
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return fallback;
      const parsed = JSON.parse(raw);
      return {
        ...fallback,
        ...parsed,
        items: Array.isArray(parsed.items) ? parsed.items : [],
        shoppingList: Array.isArray(parsed.shoppingList) ? parsed.shoppingList : [],
        logs: Array.isArray(parsed.logs) ? parsed.logs : []
      };
    } catch (err) {
      console.warn("Failed to load local state", err);
      return fallback;
    }
  }

  function saveState() {
    state.updatedAt = nowISO();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function snapshotForUndo() {
    return {
      items: clone(state.items),
      shoppingList: clone(state.shoppingList)
    };
  }

  function addLog({ rawInput = "", parsedResult = null, action, itemId = "", itemName = "", quantityChange = 0, unit = "", beforeSnapshot = null, afterSnapshot = null }) {
    state.logs.unshift({
      id: uid("log"),
      householdId: state.householdId,
      userId: state.userId,
      timestamp: nowISO(),
      rawInput,
      parsedResult,
      action,
      actionLabel: ACTION_LABELS[action] || action,
      itemId,
      itemName,
      quantityChange: asNumber(quantityChange, 0),
      unit,
      actorId: state.userId,
      modifiedBy: state.userId,
      undoStateBefore: beforeSnapshot,
      undoStateAfter: afterSnapshot,
      undone: false
    });
    state.logs = state.logs.slice(0, 300);
  }

  function totalQty(item) {
    if (!item) return 0;
    const batches = Array.isArray(item.batches) ? item.batches : [];
    if (!batches.length) return asNumber(item.currentQuantity, 0);
    return batches.reduce((sum, b) => sum + asNumber(b.quantity, 0), 0);
  }

  function syncItemQty(item) {
    item.currentQuantity = totalQty(item);
    item.updatedAt = nowISO();
  }

  function getItemById(id) {
    return state.items.find(item => item.id === id);
  }

  function getBatchById(item, batchId) {
    return (item?.batches || []).find(batch => batch.id === batchId);
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const d = new Date(`${dateStr}T00:00:00`);
    if (Number.isNaN(d.getTime())) return null;
    const today = new Date(`${todayISO()}T00:00:00`);
    return Math.ceil((d - today) / 86400000);
  }

  function isExpiredItem(item) {
    return (item.batches || []).some(batch => asNumber(batch.quantity, 0) > 0 && batch.expiryDate && daysUntil(batch.expiryDate) < 0);
  }

  function isExpiringItem(item) {
    if (item.expiryReminderEnabled === false) return false;
    const reminderDays = asNumber(item.expiryReminderDays, 0);
    return (item.batches || []).some(batch => {
      const days = daysUntil(batch.expiryDate);
      return asNumber(batch.quantity, 0) > 0 && days !== null && days >= 0 && days <= reminderDays;
    });
  }

  function isLowStockItem(item) {
    return totalQty(item) <= asNumber(item.minStock, 0);
  }

  function getExpiredBatches() {
    return state.items.flatMap(item => (item.batches || [])
      .filter(batch => asNumber(batch.quantity, 0) > 0 && batch.expiryDate && daysUntil(batch.expiryDate) < 0)
      .map(batch => ({ item, batch, days: daysUntil(batch.expiryDate) })));
  }

  function getExpiringBatches() {
    return state.items.flatMap(item => {
      if (item.expiryReminderEnabled === false) return [];
      const reminderDays = asNumber(item.expiryReminderDays, 0);
      return (item.batches || [])
        .filter(batch => {
          const days = daysUntil(batch.expiryDate);
          return asNumber(batch.quantity, 0) > 0 && days !== null && days >= 0 && days <= reminderDays;
        })
        .map(batch => ({ item, batch, days: daysUntil(batch.expiryDate) }));
    }).sort((a, b) => a.days - b.days);
  }

  function ensureAutoShoppingList() {
    let changed = false;
    state.items.forEach(item => {
      const qty = totalQty(item);
      const min = asNumber(item.minStock, 0);
      if (min > 0 && qty <= min) {
        const exists = state.shoppingList.some(row => row.itemId === item.id && row.status === "待买" && row.reason.includes("低库存"));
        if (!exists) {
          state.shoppingList.unshift({
            id: uid("shop"),
            householdId: state.householdId,
            userId: state.userId,
            itemId: item.id,
            itemName: item.name,
            suggestedQuantity: Math.max(1, min - qty + 1),
            unit: item.unit || "",
            reason: `低库存：当前 ${formatQty(qty)}${item.unit || ""}，最低 ${formatQty(min)}${item.unit || ""}`,
            status: "待买",
            createdAt: nowISO(),
            updatedAt: nowISO()
          });
          changed = true;
        }
      }
    });
    if (changed) saveState();
  }

  function levenshtein(a, b) {
    a = normalizeName(a);
    b = normalizeName(b);
    const matrix = Array.from({ length: a.length + 1 }, (_, i) => [i]);
    for (let j = 1; j <= b.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= a.length; i++) {
      for (let j = 1; j <= b.length; j++) {
        const cost = a[i - 1] === b[j - 1] ? 0 : 1;
        matrix[i][j] = Math.min(
          matrix[i - 1][j] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j - 1] + cost
        );
      }
    }
    return matrix[a.length][b.length];
  }

  function findItemCandidates(name) {
    const norm = normalizeName(name);
    if (!norm) return { exact: null, similar: [] };

    const scored = state.items.map(item => {
      const names = [item.name, ...(Array.isArray(item.aliases) ? item.aliases : [])].filter(Boolean);
      const exact = names.some(n => normalizeName(n) === norm);
      const includes = names.some(n => normalizeName(n).includes(norm) || norm.includes(normalizeName(n)));
      const bestDistance = Math.min(...names.map(n => levenshtein(n, name)));
      const longest = Math.max(norm.length, ...names.map(n => normalizeName(n).length), 1);
      const score = exact ? 1 : includes ? 0.82 : 1 - bestDistance / longest;
      return { item, exact, score };
    }).sort((a, b) => b.score - a.score);

    const exactHit = scored.find(s => s.exact)?.item || null;
    const similar = scored
      .filter(s => !s.exact && s.score >= 0.42)
      .slice(0, 5)
      .map(s => s.item);

    return { exact: exactHit, similar };
  }

  function parseChineseNumber(text) {
    if (!text) return null;
    const direct = String(text).match(/\d+(?:\.\d+)?/);
    if (direct) return Number(direct[0]);

    const map = { 零:0, 一:1, 二:2, 两:2, 三:3, 四:4, 五:5, 六:6, 七:7, 八:8, 九:9 };
    let s = String(text).trim();
    if (!s) return null;
    if (s === "十") return 10;
    if (s.includes("十")) {
      const parts = s.split("十");
      const tens = parts[0] ? map[parts[0]] : 1;
      const ones = parts[1] ? map[parts[1]] : 0;
      if (tens !== undefined && ones !== undefined) return tens * 10 + ones;
    }
    return map[s] ?? null;
  }

  function parseDateFromText(text) {
    const raw = String(text || "");
    const today = new Date();

    if (/后天/.test(raw)) {
      const d = new Date(today);
      d.setDate(d.getDate() + 2);
      return toDateInputValue(d);
    }
    if (/明天/.test(raw)) {
      const d = new Date(today);
      d.setDate(d.getDate() + 1);
      return toDateInputValue(d);
    }
    if (/今天/.test(raw)) return todayISO();

    let m = raw.match(/(\d{4})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})日?/);
    if (m) {
      const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      return Number.isNaN(d.getTime()) ? "" : toDateInputValue(d);
    }

    m = raw.match(/(\d{1,2})\s*月\s*(\d{1,2})\s*日?/);
    if (m) {
      const d = new Date(today.getFullYear(), Number(m[1]) - 1, Number(m[2]));
      return Number.isNaN(d.getTime()) ? "" : toDateInputValue(d);
    }

    m = raw.match(/(\d{1,2})[\/\-](\d{1,2})/);
    if (m) {
      const d = new Date(today.getFullYear(), Number(m[1]) - 1, Number(m[2]));
      return Number.isNaN(d.getTime()) ? "" : toDateInputValue(d);
    }

    return "";
  }

  function cleanItemName(text) {
    return String(text || "")
      .replace(/(\d{4})[\/\-.年](\d{1,2})[\/\-.月](\d{1,2})日?/g, "")
      .replace(/(\d{1,2})\s*月\s*(\d{1,2})\s*日?/g, "")
      .replace(/(\d{1,2})[\/\-](\d{1,2})/g, "")
      .replace(/加入购物清单|加入清单|加到购物清单|加购物清单/g, "")
      .replace(/过期|到期/g, "")
      .replace(/买了|购买了|买|加了|增加|新增|添加|加入|入库|补了|补/g, "")
      .replace(/吃了|喝了|用了|用掉|消耗|拿了|减少|减了|减/g, "")
      .replace(/还剩|剩余|剩|用完了|用完|没了|没有了/g, "")
      .replace(/\d+(?:\.\d+)?/g, "")
      .replace(/[零一二两三四五六七八九十]+/g, "")
      .replace(/盒|包|个|斤|瓶|袋|卷|支|罐|桶|升|毫升|片|粒|只|条|件|箱|袋/g, "")
      .replace(/[，。,.！!？?\s]/g, "")
      .trim();
  }

  function parseQuickInput(rawInput) {
    const raw = String(rawInput || "").trim();
    if (!raw) return null;

    const expiryDate = parseDateFromText(raw);
    const qtyMatch = raw.match(/(\d+(?:\.\d+)?|[零一二两三四五六七八九十]+)\s*(盒|包|个|斤|瓶|袋|卷|支|罐|桶|升|毫升|片|粒|只|条|件|箱)?/);
    let quantity = qtyMatch ? parseChineseNumber(qtyMatch[1]) : null;
    let unit = qtyMatch?.[2] || "";

    let action = "add";
    if (/加入购物清单|加入清单|加到购物清单|加购物清单/.test(raw)) action = "addToShopping";
    else if (/用完了|用完|没了|没有了/.test(raw)) { action = "usedUp"; quantity = 0; }
    else if (/还剩|剩余|剩/.test(raw)) action = "setRemaining";
    else if (/过期|到期/.test(raw)) action = "setExpiry";
    else if (/减|减少|吃了|喝了|用了|用掉|消耗|拿了/.test(raw)) action = "reduce";
    else if (/买了|购买了|买|加|增加|新增|添加|加入|入库|补/.test(raw)) action = "add";

    let itemName = cleanItemName(raw);

    if (!itemName && qtyMatch) {
      const parts = raw.split(qtyMatch[0]);
      itemName = cleanItemName(parts[1] || parts[0] || "");
    }

    if (!itemName) itemName = cleanItemName(raw);

    if ((action === "add" || action === "reduce" || action === "setRemaining") && (quantity === null || Number.isNaN(quantity))) {
      quantity = 1;
    }

    const candidates = findItemCandidates(itemName);
    const exactItem = candidates.exact;
    if (!unit && exactItem?.unit) unit = exactItem.unit;

    return {
      rawInput: raw,
      itemName,
      action,
      actionLabel: ACTION_LABELS[action],
      quantity,
      unit,
      expiryDate,
      itemId: exactItem?.id || "",
      similarItemIds: candidates.similar.map(item => item.id),
      confidence: exactItem ? "exact" : candidates.similar.length ? "similar" : "new"
    };
  }

  function addStock(item, quantity, { unit = "", expiryDate = "", purchaseDate = "", location = "", notes = "", rawInput = "", parsedResult = null, action = "add" } = {}) {
    const qty = asNumber(quantity, 0);
    if (qty <= 0) throw new Error("增加数量必须大于 0");
    const before = snapshotForUndo();

    item.unit = unit || item.unit || "";
    if (!Array.isArray(item.batches)) item.batches = [];

    let batch = null;
    if (!expiryDate) {
      batch = item.batches.find(b => !b.expiryDate && (b.location || "") === (location || item.location || ""));
    }

    if (batch) {
      batch.quantity = asNumber(batch.quantity, 0) + qty;
      batch.purchaseDate = purchaseDate || batch.purchaseDate || todayISO();
      batch.notes = notes || batch.notes || "";
      batch.updatedAt = nowISO();
    } else {
      item.batches.push({
        id: uid("batch"),
        householdId: state.householdId,
        userId: state.userId,
        quantity: qty,
        purchaseDate: purchaseDate || todayISO(),
        expiryDate: expiryDate || "",
        location: location || item.location || "",
        notes: notes || "",
        createdAt: nowISO(),
        updatedAt: nowISO()
      });
    }

    syncItemQty(item);
    const after = snapshotForUndo();
    addLog({
      rawInput,
      parsedResult,
      action,
      itemId: item.id,
      itemName: item.name,
      quantityChange: qty,
      unit: item.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
    ensureAutoShoppingList();
  }

  function reduceStockFEFO(item, quantity, { rawInput = "", parsedResult = null, action = "reduce" } = {}) {
    const qty = asNumber(quantity, 0);
    if (qty <= 0) throw new Error("减少数量必须大于 0");
    if (totalQty(item) < qty) {
      if (!confirm(`当前库存只有 ${formatQty(totalQty(item))}${item.unit || ""}，仍然要扣到 0 吗？`)) return;
    }

    const before = snapshotForUndo();
    let remaining = qty;
    const batches = (item.batches || [])
      .filter(b => asNumber(b.quantity, 0) > 0)
      .sort((a, b) => {
        const da = a.expiryDate ? new Date(a.expiryDate).getTime() : Infinity;
        const db = b.expiryDate ? new Date(b.expiryDate).getTime() : Infinity;
        return da - db;
      });

    for (const batch of batches) {
      if (remaining <= 0) break;
      const available = asNumber(batch.quantity, 0);
      const used = Math.min(available, remaining);
      batch.quantity = available - used;
      batch.updatedAt = nowISO();
      remaining -= used;
    }

    syncItemQty(item);
    const after = snapshotForUndo();
    addLog({
      rawInput,
      parsedResult,
      action,
      itemId: item.id,
      itemName: item.name,
      quantityChange: -Math.min(qty, qty - remaining),
      unit: item.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
    ensureAutoShoppingList();
  }

  function setRemaining(item, quantity, { rawInput = "", parsedResult = null, action = "setRemaining" } = {}) {
    const target = Math.max(0, asNumber(quantity, 0));
    const current = totalQty(item);
    const diff = target - current;
    if (Math.abs(diff) < 0.000001) return;

    if (diff > 0) {
      addStock(item, diff, { unit: item.unit, rawInput, parsedResult, action });
      return;
    }

    reduceStockFEFO(item, Math.abs(diff), { rawInput, parsedResult, action });
  }

  function setItemExpiry(item, expiryDate, { rawInput = "", parsedResult = null } = {}) {
    if (!expiryDate) throw new Error("需要填写过期日期");
    const before = snapshotForUndo();

    if (!Array.isArray(item.batches)) item.batches = [];
    let batch = item.batches.find(b => asNumber(b.quantity, 0) > 0 && !b.expiryDate);
    if (!batch) batch = item.batches.find(b => asNumber(b.quantity, 0) > 0);
    if (!batch) {
      batch = {
        id: uid("batch"),
        householdId: state.householdId,
        userId: state.userId,
        quantity: 0,
        purchaseDate: todayISO(),
        expiryDate: "",
        location: item.location || "",
        notes: "仅记录过期日，稍后可补数量",
        createdAt: nowISO(),
        updatedAt: nowISO()
      };
      item.batches.push(batch);
    }

    batch.expiryDate = expiryDate;
    batch.updatedAt = nowISO();
    syncItemQty(item);

    const after = snapshotForUndo();
    addLog({
      rawInput,
      parsedResult,
      action: "setExpiry",
      itemId: item.id,
      itemName: item.name,
      quantityChange: 0,
      unit: item.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
  }

  function createItemFromFields(fields) {
    const qty = asNumber(fields.currentQuantity, 0);
    const item = {
      id: uid("item"),
      householdId: state.householdId,
      userId: state.userId,
      name: fields.name.trim(),
      aliases: String(fields.aliases || "").split(/[,，]/).map(s => s.trim()).filter(Boolean),
      category: fields.category || "其他",
      brand: fields.brand || "",
      spec: fields.spec || "",
      unit: fields.unit || "",
      currentQuantity: qty,
      minStock: asNumber(fields.minStock, 0),
      expiryReminderDays: asNumber(fields.expiryReminderDays, 7),
      expiryReminderEnabled: fields.expiryReminderEnabled !== false,
      location: fields.location || "",
      barcode: fields.barcode || "",
      notes: fields.notes || "",
      batches: [],
      createdAt: nowISO(),
      updatedAt: nowISO()
    };
    if (qty > 0) {
      item.batches.push({
        id: uid("batch"),
        householdId: state.householdId,
        userId: state.userId,
        quantity: qty,
        purchaseDate: todayISO(),
        expiryDate: "",
        location: item.location || "",
        notes: "初始库存",
        createdAt: nowISO(),
        updatedAt: nowISO()
      });
    }
    state.items.unshift(item);
    saveState();
    ensureAutoShoppingList();
    return item;
  }

  function updateItemFromFields(item, fields) {
    const before = snapshotForUndo();
    const oldQty = totalQty(item);
    item.name = fields.name.trim();
    item.aliases = String(fields.aliases || "").split(/[,，]/).map(s => s.trim()).filter(Boolean);
    item.category = fields.category || "其他";
    item.brand = fields.brand || "";
    item.spec = fields.spec || "";
    item.unit = fields.unit || item.unit || "";
    item.minStock = asNumber(fields.minStock, 0);
    item.expiryReminderDays = asNumber(fields.expiryReminderDays, 7);
    item.expiryReminderEnabled = fields.expiryReminderEnabled !== false;
    item.location = fields.location || "";
    item.barcode = fields.barcode || "";
    item.notes = fields.notes || "";
    item.updatedAt = nowISO();

    const targetQty = asNumber(fields.currentQuantity, oldQty);
    const diff = targetQty - oldQty;
    if (Math.abs(diff) > 0.000001) {
      if (diff > 0) {
        if (!Array.isArray(item.batches)) item.batches = [];
        let batch = item.batches.find(b => !b.expiryDate && (b.location || "") === (item.location || ""));
        if (!batch) {
          batch = {
            id: uid("batch"),
            householdId: state.householdId,
            userId: state.userId,
            quantity: 0,
            purchaseDate: todayISO(),
            expiryDate: "",
            location: item.location || "",
            notes: "编辑物品时调整总数",
            createdAt: nowISO(),
            updatedAt: nowISO()
          };
          item.batches.push(batch);
        }
        batch.quantity = asNumber(batch.quantity, 0) + diff;
      } else {
        let remaining = Math.abs(diff);
        const batches = (item.batches || []).filter(b => asNumber(b.quantity, 0) > 0).sort((a, b) => {
          const da = a.expiryDate ? new Date(a.expiryDate).getTime() : Infinity;
          const db = b.expiryDate ? new Date(b.expiryDate).getTime() : Infinity;
          return da - db;
        });
        for (const batch of batches) {
          if (remaining <= 0) break;
          const used = Math.min(asNumber(batch.quantity, 0), remaining);
          batch.quantity = asNumber(batch.quantity, 0) - used;
          remaining -= used;
        }
      }
    }
    syncItemQty(item);

    const after = snapshotForUndo();
    if (Math.abs(diff) > 0.000001) {
      addLog({
        rawInput: "编辑物品表单",
        parsedResult: { beforeQuantity: oldQty, afterQuantity: targetQty },
        action: "editItem",
        itemId: item.id,
        itemName: item.name,
        quantityChange: diff,
        unit: item.unit,
        beforeSnapshot: before,
        afterSnapshot: after
      });
    }

    saveState();
    ensureAutoShoppingList();
  }

  function addToShoppingList({ item = null, itemName = "", suggestedQuantity = 1, unit = "", reason = "手动加入", status = "待买" }) {
    const before = snapshotForUndo();
    const row = {
      id: uid("shop"),
      householdId: state.householdId,
      userId: state.userId,
      itemId: item?.id || "",
      itemName: item?.name || itemName,
      suggestedQuantity: asNumber(suggestedQuantity, 1),
      unit: unit || item?.unit || "",
      reason,
      status,
      createdAt: nowISO(),
      updatedAt: nowISO()
    };
    state.shoppingList.unshift(row);
    const after = snapshotForUndo();
    addLog({
      rawInput: reason,
      parsedResult: row,
      action: "addToShopping",
      itemId: row.itemId,
      itemName: row.itemName,
      quantityChange: 0,
      unit: row.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
  }

  function applyParsed(parsed, selectedItemId = "") {
    const itemId = selectedItemId || parsed.itemId || "";
    let item = itemId ? getItemById(itemId) : null;

    if (!item) {
      const name = $("#confirmNewName")?.value?.trim() || parsed.itemName;
      if (!name) throw new Error("需要物品名称");
      item = createItemFromFields({
        name,
        aliases: "",
        category: $("#confirmNewCategory")?.value || "其他",
        brand: "",
        spec: "",
        unit: $("#confirmUnit")?.value || parsed.unit || "",
        currentQuantity: 0,
        minStock: 0,
        expiryReminderDays: 7,
        expiryReminderEnabled: true,
        location: "",
        barcode: "",
        notes: "由快速输入创建"
      });
    }

    const quantity = asNumber($("#confirmQty")?.value ?? parsed.quantity, parsed.quantity ?? 1);
    const unit = $("#confirmUnit")?.value || parsed.unit || item.unit || "";
    const expiryDate = $("#confirmExpiry")?.value || parsed.expiryDate || "";

    const enriched = {
      ...parsed,
      itemId: item.id,
      itemName: item.name,
      quantity,
      unit,
      expiryDate
    };

    if (parsed.action === "add") {
      addStock(item, quantity, { unit, expiryDate, rawInput: parsed.rawInput, parsedResult: enriched, action: "add" });
    } else if (parsed.action === "reduce") {
      reduceStockFEFO(item, quantity, { rawInput: parsed.rawInput, parsedResult: enriched, action: "reduce" });
    } else if (parsed.action === "setRemaining") {
      setRemaining(item, quantity, { rawInput: parsed.rawInput, parsedResult: enriched, action: "setRemaining" });
    } else if (parsed.action === "usedUp") {
      setRemaining(item, 0, { rawInput: parsed.rawInput, parsedResult: enriched, action: "usedUp" });
    } else if (parsed.action === "setExpiry") {
      setItemExpiry(item, expiryDate, { rawInput: parsed.rawInput, parsedResult: enriched });
    } else if (parsed.action === "addToShopping") {
      addToShoppingList({ item, suggestedQuantity: quantity || 1, unit, reason: `语音/文字输入：${parsed.rawInput}` });
    }

    pendingParse = null;
    $("#confirmArea").innerHTML = "";
    $("#quickText").value = "";
    toast("已更新");
    render();
  }

  function renderConfirm(parsed) {
    const exactItem = parsed.itemId ? getItemById(parsed.itemId) : null;
    const similar = (parsed.similarItemIds || []).map(id => getItemById(id)).filter(Boolean);
    const needsQuantity = ["add", "reduce", "setRemaining"].includes(parsed.action);
    const needsExpiry = ["add", "setExpiry"].includes(parsed.action);

    const existingOptions = [
      exactItem ? `<option value="${exactItem.id}" selected>${escapeHtml(exactItem.name)}（已匹配）</option>` : "",
      ...similar.map(item => `<option value="${item.id}">${escapeHtml(item.name)}（可能是）</option>`),
      `<option value="">创建新物品</option>`
    ].join("");

    $("#confirmArea").innerHTML = `
      <div class="card confirm-card">
        <div class="row between wrap">
          <div>
            <b>确认这次操作</b>
            <div class="tiny muted">原始输入：${escapeHtml(parsed.rawInput)}</div>
          </div>
          <span class="pill primary">${escapeHtml(parsed.actionLabel)}</span>
        </div>

        <div class="grid desktop-two" style="margin-top:12px;">
          <label>物品
            ${exactItem || similar.length
              ? `<select id="confirmItemSelect">${existingOptions}</select>`
              : `<input id="confirmNewName" value="${escapeHtml(parsed.itemName)}" placeholder="物品名称">`
            }
          </label>

          ${(!exactItem && !similar.length) ? `
          <label>分类
            <select id="confirmNewCategory">${CATEGORIES.map(c => `<option ${c === "其他" ? "selected" : ""}>${c}</option>`).join("")}</select>
          </label>` : ""}

          ${needsQuantity ? `<label>数量<input id="confirmQty" type="number" step="0.01" min="0" value="${escapeHtml(parsed.quantity ?? 1)}"></label>` : ""}
          <label>单位<input id="confirmUnit" value="${escapeHtml(parsed.unit || exactItem?.unit || "")}" placeholder="盒 / 包 / 个 / 斤"></label>
          ${needsExpiry ? `<label>过期日<input id="confirmExpiry" type="date" value="${escapeHtml(parsed.expiryDate || "")}"></label>` : ""}
        </div>

        ${similar.length && !exactItem ? `<div class="tiny warn-text" style="margin-top:10px;">找到相似物品。请选择已有物品，或选择“创建新物品”。</div>` : ""}
        ${!exactItem && !similar.length ? `<div class="tiny warn-text" style="margin-top:10px;">没有找到物品。确认后会新增物品，并使用你选择的分类。</div>` : ""}

        <div class="row wrap" style="margin-top:14px;">
          <button class="primary" id="confirmApplyBtn">确认更新</button>
          <button class="ghost" id="confirmCancelBtn">取消</button>
        </div>
      </div>
    `;

    $("#confirmCancelBtn").onclick = () => {
      pendingParse = null;
      $("#confirmArea").innerHTML = "";
    };

    $("#confirmApplyBtn").onclick = () => {
      try {
        const selectedId = $("#confirmItemSelect")?.value || "";
        applyParsed(parsed, selectedId);
      } catch (err) {
        alert(err.message || err);
      }
    };

    $("#confirmArea").scrollIntoView({ behavior: "smooth", block: "center" });
  }

  function render() {
    ensureAutoShoppingList();
    renderCategoryFilter();
    renderHome();
    renderInventory();
    renderShopping();
    renderLogs();
    updateUndoState();
  }

  function renderCategoryFilter() {
    const select = $("#categoryFilter");
    const current = select.value || "";
    select.innerHTML = `<option value="">全部分类</option>` + CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");
    select.value = current;
  }

  function renderHome() {
    const low = state.items.filter(isLowStockItem);
    const expiring = getExpiringBatches();
    const expired = getExpiredBatches();
    const pendingShopping = state.shoppingList.filter(row => row.status === "待买");

    $("#summaryGrid").innerHTML = `
      <div class="summary-cell"><b>${low.length}</b><span class="tiny muted">低库存</span></div>
      <div class="summary-cell"><b>${expiring.length}</b><span class="tiny muted">临期批次</span></div>
      <div class="summary-cell"><b>${pendingShopping.length}</b><span class="tiny muted">待买</span></div>
    `;

    $("#homeLowStock").innerHTML = low.length ? low.slice(0, 5).map(item => `
      <div class="batch-row">
        <div class="row between">
          <b>${escapeHtml(item.name)}</b>
          <span class="pill warn">${formatQty(totalQty(item))}${escapeHtml(item.unit || "")}</span>
        </div>
        <div class="tiny muted">最低库存：${formatQty(item.minStock)}${escapeHtml(item.unit || "")} · ${escapeHtml(item.location || "未设置位置")}</div>
      </div>
    `).join("") : `<div class="empty">暂无低库存物品</div>`;

    $("#homeExpiring").innerHTML = expiring.length ? expiring.slice(0, 5).map(({ item, batch, days }) => `
      <div class="batch-row">
        <div class="row between">
          <b>${escapeHtml(item.name)}</b>
          <span class="pill warn">${days} 天后</span>
        </div>
        <div class="tiny muted">过期日：${escapeHtml(batch.expiryDate)} · 批次数量：${formatQty(batch.quantity)}${escapeHtml(item.unit || "")}</div>
      </div>
    `).join("") : `<div class="empty">暂无临期物品</div>`;

    $("#homeExpired").innerHTML = expired.length ? expired.slice(0, 5).map(({ item, batch, days }) => `
      <div class="batch-row">
        <div class="row between">
          <b>${escapeHtml(item.name)}</b>
          <span class="pill danger">已过期 ${Math.abs(days)} 天</span>
        </div>
        <div class="tiny muted">过期日：${escapeHtml(batch.expiryDate)} · 批次数量：${formatQty(batch.quantity)}${escapeHtml(item.unit || "")}</div>
      </div>
    `).join("") : `<div class="empty">暂无已过期物品</div>`;

    $("#homeShopping").innerHTML = pendingShopping.length ? pendingShopping.slice(0, 5).map(row => `
      <div class="shopping-row">
        <div class="row between">
          <b>${escapeHtml(row.itemName)}</b>
          <span class="pill">${formatQty(row.suggestedQuantity)}${escapeHtml(row.unit || "")}</span>
        </div>
        <div class="tiny muted">${escapeHtml(row.reason)}</div>
      </div>
    `).join("") : `<div class="empty">购物清单为空</div>`;
  }

  function renderInventory() {
    const category = $("#categoryFilter").value;
    const onlyLow = $("#filterLow").checked;
    const onlyExpiring = $("#filterExpiring").checked;
    const onlyExpired = $("#filterExpired").checked;

    let items = [...state.items];
    if (category) items = items.filter(item => item.category === category);
    if (onlyLow) items = items.filter(isLowStockItem);
    if (onlyExpiring) items = items.filter(isExpiringItem);
    if (onlyExpired) items = items.filter(isExpiredItem);

    if (!items.length) {
      $("#inventoryList").innerHTML = `<div class="empty">没有符合条件的物品。点击“新增物品”开始记录。</div>`;
      return;
    }

    $("#inventoryList").innerHTML = items.map(item => renderItemCard(item)).join("");

    $$("#inventoryList [data-expand]").forEach(btn => btn.onclick = () => {
      const id = btn.dataset.expand;
      if (expandedItems.has(id)) expandedItems.delete(id); else expandedItems.add(id);
      renderInventory();
    });
    $$("#inventoryList [data-edit-item]").forEach(btn => btn.onclick = () => openItemModal(btn.dataset.editItem));
    $$("#inventoryList [data-delete-item]").forEach(btn => btn.onclick = () => deleteItem(btn.dataset.deleteItem));
    $$("#inventoryList [data-add-batch]").forEach(btn => btn.onclick = () => openBatchModal(btn.dataset.addBatch));
    $$("#inventoryList [data-edit-batch]").forEach(btn => btn.onclick = () => openBatchModal(btn.dataset.itemId, btn.dataset.editBatch));
    $$("#inventoryList [data-delete-batch]").forEach(btn => btn.onclick = () => deleteBatch(btn.dataset.itemId, btn.dataset.deleteBatch));
    $$("#inventoryList [data-quick-add]").forEach(btn => btn.onclick = () => quickAdjust(btn.dataset.quickAdd, "add"));
    $$("#inventoryList [data-quick-reduce]").forEach(btn => btn.onclick = () => quickAdjust(btn.dataset.quickReduce, "reduce"));
    $$("#inventoryList [data-shop-item]").forEach(btn => btn.onclick = () => {
      const item = getItemById(btn.dataset.shopItem);
      if (item) {
        addToShoppingList({ item, suggestedQuantity: Math.max(1, asNumber(item.minStock, 0) - totalQty(item) + 1), reason: "手动加入" });
        toast("已加入购物清单");
        render();
      }
    });
  }

  function renderItemCard(item) {
    const qty = totalQty(item);
    const low = isLowStockItem(item);
    const expiring = isExpiringItem(item);
    const expired = isExpiredItem(item);
    const expanded = expandedItems.has(item.id);

    return `
      <article class="card">
        <div class="item-title">
          <div>
            <h3>${escapeHtml(item.name)}</h3>
            <div class="item-meta">
              <span class="pill">${escapeHtml(item.category || "其他")}</span>
              ${item.brand ? `<span class="pill">${escapeHtml(item.brand)}</span>` : ""}
              ${item.spec ? `<span class="pill">${escapeHtml(item.spec)}</span>` : ""}
              ${low ? `<span class="pill warn">低库存</span>` : ""}
              ${expiring ? `<span class="pill warn">临期</span>` : ""}
              ${expired ? `<span class="pill danger">已过期</span>` : ""}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:26px;font-weight:900;">${formatQty(qty)}<span class="small-text">${escapeHtml(item.unit || "")}</span></div>
            <div class="tiny muted">最低 ${formatQty(item.minStock)}${escapeHtml(item.unit || "")}</div>
          </div>
        </div>

        <div class="tiny muted" style="margin-top:8px;">
          ${item.location ? `位置：${escapeHtml(item.location)} · ` : ""}
          ${item.aliases?.length ? `别名：${escapeHtml(item.aliases.join("、"))} · ` : ""}
          ${item.expiryReminderEnabled === false ? "不提醒临期" : `临期提醒：${formatQty(item.expiryReminderDays)} 天`}
        </div>

        <div class="row wrap" style="margin-top:12px;">
          <button class="small" data-expand="${item.id}">${expanded ? "收起批次" : "展开批次"}</button>
          <button class="small primary" data-quick-add="${item.id}">增加</button>
          <button class="small" data-quick-reduce="${item.id}">减少</button>
          <button class="small" data-shop-item="${item.id}">加清单</button>
          <button class="small ghost" data-edit-item="${item.id}">编辑</button>
          <button class="small danger" data-delete-item="${item.id}">删除</button>
        </div>

        ${expanded ? renderBatchList(item) : ""}
      </article>
    `;
  }

  function renderBatchList(item) {
    const batches = [...(item.batches || [])].sort((a, b) => {
      const da = a.expiryDate ? new Date(a.expiryDate).getTime() : Infinity;
      const db = b.expiryDate ? new Date(b.expiryDate).getTime() : Infinity;
      return da - db;
    });

    return `
      <div class="batch-list">
        <div class="row between">
          <b>批次</b>
          <button class="small primary" data-add-batch="${item.id}">新增批次</button>
        </div>
        ${batches.length ? batches.map(batch => {
          const days = daysUntil(batch.expiryDate);
          let tag = "";
          if (days !== null && days < 0) tag = `<span class="pill danger">已过期 ${Math.abs(days)} 天</span>`;
          else if (days !== null && item.expiryReminderEnabled !== false && days <= asNumber(item.expiryReminderDays, 0)) tag = `<span class="pill warn">${days} 天后过期</span>`;
          else if (batch.expiryDate) tag = `<span class="pill ok">${days} 天后过期</span>`;
          return `
            <div class="batch-row">
              <div class="row between wrap">
                <b>${formatQty(batch.quantity)}${escapeHtml(item.unit || "")}</b>
                ${tag || `<span class="pill">无过期日</span>`}
              </div>
              <div class="tiny muted">
                购买：${escapeHtml(batch.purchaseDate || "未填")} · 过期：${escapeHtml(batch.expiryDate || "未填")} · 位置：${escapeHtml(batch.location || item.location || "未填")}
              </div>
              ${batch.notes ? `<div class="tiny muted">备注：${escapeHtml(batch.notes)}</div>` : ""}
              <div class="row wrap" style="margin-top:8px;">
                <button class="small ghost" data-item-id="${item.id}" data-edit-batch="${batch.id}">编辑批次</button>
                <button class="small danger" data-item-id="${item.id}" data-delete-batch="${batch.id}">删除批次</button>
              </div>
            </div>
          `;
        }).join("") : `<div class="empty">暂无批次。建议按不同过期日期新增批次。</div>`}
      </div>
    `;
  }

  function renderShopping() {
    const rows = state.shoppingList;
    if (!rows.length) {
      $("#shoppingList").innerHTML = `<div class="empty">购物清单为空。低库存物品会自动加入，也可以手动添加。</div>`;
      return;
    }

    $("#shoppingList").innerHTML = rows.map(row => `
      <div class="card tight">
        <div class="row between wrap">
          <div>
            <b>${escapeHtml(row.itemName)}</b>
            <div class="tiny muted">${escapeHtml(row.reason)}</div>
          </div>
          <span class="pill ${row.status === "待买" ? "warn" : row.status === "已买" ? "ok" : ""}">${escapeHtml(row.status)}</span>
        </div>
        <div class="tiny muted" style="margin-top:6px;">建议购买：${formatQty(row.suggestedQuantity)}${escapeHtml(row.unit || "")}</div>
        <div class="row wrap" style="margin-top:10px;">
          <button class="small primary" data-shopping-bought="${row.id}">标记已买并入库</button>
          <button class="small" data-shopping-ignore="${row.id}">忽略</button>
          <button class="small ghost" data-shopping-pending="${row.id}">待买</button>
          <button class="small danger" data-shopping-delete="${row.id}">删除</button>
        </div>
      </div>
    `).join("");

    $$("#shoppingList [data-shopping-bought]").forEach(btn => btn.onclick = () => markShoppingBought(btn.dataset.shoppingBought));
    $$("#shoppingList [data-shopping-ignore]").forEach(btn => btn.onclick = () => setShoppingStatus(btn.dataset.shoppingIgnore, "忽略"));
    $$("#shoppingList [data-shopping-pending]").forEach(btn => btn.onclick = () => setShoppingStatus(btn.dataset.shoppingPending, "待买"));
    $$("#shoppingList [data-shopping-delete]").forEach(btn => btn.onclick = () => deleteShopping(btn.dataset.shoppingDelete));
  }

  function renderLogs() {
    if (!state.logs.length) {
      $("#logsList").innerHTML = `<div class="empty">暂无操作日志</div>`;
      return;
    }

    $("#logsList").innerHTML = state.logs.slice(0, 120).map(log => `
      <div class="log-row" style="margin-top:10px;">
        <div class="row between wrap">
          <b>${escapeHtml(log.actionLabel || log.action)}</b>
          <span class="pill">${escapeHtml(new Date(log.timestamp).toLocaleString())}</span>
        </div>
        <div class="tiny muted">物品：${escapeHtml(log.itemName || "-")} · 数量变化：${formatQty(log.quantityChange)}${escapeHtml(log.unit || "")} · 修改人：${escapeHtml(log.modifiedBy || log.actorId || "-")}</div>
        <div class="tiny muted">原始输入：${escapeHtml(log.rawInput || "-")}</div>
        ${log.undone ? `<div class="tiny warn-text">这条操作已撤销</div>` : ""}
      </div>
    `).join("");
  }

  function updateUndoState() {
    const latest = state.logs.find(log => log.action !== "undo" && !log.undone && log.undoStateBefore);
    $("#undoBtn").disabled = !latest;
  }

  function openModal(html) {
    $("#modal").innerHTML = html;
    $("#modalBackdrop").classList.add("show");
    $("#modalBackdrop").setAttribute("aria-hidden", "false");
  }

  function closeModal() {
    $("#modalBackdrop").classList.remove("show");
    $("#modalBackdrop").setAttribute("aria-hidden", "true");
    $("#modal").innerHTML = "";
  }

  function itemFormHtml(item = null) {
    const isEdit = Boolean(item);
    const currentQty = item ? totalQty(item) : 0;
    return `
      <h2>${isEdit ? "编辑物品" : "新增物品"}</h2>
      <form id="itemForm" class="grid">
        <div class="grid desktop-two">
          <label>名称<input name="name" required value="${escapeHtml(item?.name || "")}" placeholder="如：牛奶"></label>
          <label>别名<input name="aliases" value="${escapeHtml((item?.aliases || []).join("，"))}" placeholder="多个别名用逗号分隔"></label>
          <label>分类<select name="category">${CATEGORIES.map(c => `<option value="${c}" ${item?.category === c ? "selected" : ""}>${c}</option>`).join("")}</select></label>
          <label>品牌<input name="brand" value="${escapeHtml(item?.brand || "")}"></label>
          <label>规格<input name="spec" value="${escapeHtml(item?.spec || "")}" placeholder="如：250ml*12"></label>
          <label>单位<input name="unit" value="${escapeHtml(item?.unit || "")}" placeholder="盒 / 包 / 个 / 斤"></label>
          <label>当前数量<input name="currentQuantity" type="number" step="0.01" min="0" value="${escapeHtml(currentQty)}"></label>
          <label>最低库存<input name="minStock" type="number" step="0.01" min="0" value="${escapeHtml(item?.minStock ?? 0)}"></label>
          <label>默认临期提醒天数<input name="expiryReminderDays" type="number" step="1" min="0" value="${escapeHtml(item?.expiryReminderDays ?? 7)}"></label>
          <label>存放位置<input name="location" value="${escapeHtml(item?.location || "")}" placeholder="冰箱 / 厨房柜 / 卫生间"></label>
          <label>条形码<input name="barcode" value="${escapeHtml(item?.barcode || "")}"></label>
        </div>
        <label class="checkbox-line"><input name="expiryReminderEnabled" type="checkbox" ${item?.expiryReminderEnabled === false ? "" : "checked"}> 开启临期提醒</label>
        <label>备注<textarea name="notes">${escapeHtml(item?.notes || "")}</textarea></label>
        <div class="row wrap">
          <button class="primary" type="submit">${isEdit ? "保存" : "新增"}</button>
          <button class="ghost" type="button" id="modalCancelBtn">取消</button>
        </div>
      </form>
    `;
  }

  function openItemModal(itemId = "") {
    const item = itemId ? getItemById(itemId) : null;
    openModal(itemFormHtml(item));
    $("#modalCancelBtn").onclick = closeModal;
    $("#itemForm").onsubmit = (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const fields = Object.fromEntries(form.entries());
      fields.expiryReminderEnabled = form.get("expiryReminderEnabled") === "on";
      if (!fields.name?.trim()) return alert("请填写名称");
      if (item) updateItemFromFields(item, fields);
      else createItemFromFields(fields);
      closeModal();
      render();
      toast(item ? "已保存物品" : "已新增物品");
    };
  }

  function batchFormHtml(item, batch = null) {
    return `
      <h2>${batch ? "编辑批次" : "新增批次"}</h2>
      <div class="tiny muted" style="margin-bottom:12px;">${escapeHtml(item.name)}：如果同一产品过期日不同，请新增批次。</div>
      <form id="batchForm" class="grid">
        <div class="grid desktop-two">
          <label>数量<input name="quantity" type="number" step="0.01" min="0" required value="${escapeHtml(batch?.quantity ?? 1)}"></label>
          <label>购买日期<input name="purchaseDate" type="date" value="${escapeHtml(batch?.purchaseDate || todayISO())}"></label>
          <label>过期日期<input name="expiryDate" type="date" value="${escapeHtml(batch?.expiryDate || "")}"></label>
          <label>存放位置<input name="location" value="${escapeHtml(batch?.location || item.location || "")}"></label>
        </div>
        <label>备注<textarea name="notes">${escapeHtml(batch?.notes || "")}</textarea></label>
        <div class="row wrap">
          <button class="primary" type="submit">保存</button>
          <button class="ghost" type="button" id="modalCancelBtn">取消</button>
        </div>
      </form>
    `;
  }

  function openBatchModal(itemId, batchId = "") {
    const item = getItemById(itemId);
    if (!item) return;
    const batch = batchId ? getBatchById(item, batchId) : null;
    openModal(batchFormHtml(item, batch));
    $("#modalCancelBtn").onclick = closeModal;
    $("#batchForm").onsubmit = (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const fields = Object.fromEntries(form.entries());
      const before = snapshotForUndo();
      if (!Array.isArray(item.batches)) item.batches = [];

      if (batch) {
        const oldQty = asNumber(batch.quantity, 0);
        batch.quantity = asNumber(fields.quantity, 0);
        batch.purchaseDate = fields.purchaseDate || "";
        batch.expiryDate = fields.expiryDate || "";
        batch.location = fields.location || "";
        batch.notes = fields.notes || "";
        batch.updatedAt = nowISO();
        syncItemQty(item);
        const after = snapshotForUndo();
        addLog({
          rawInput: "编辑批次表单",
          parsedResult: fields,
          action: "editBatch",
          itemId: item.id,
          itemName: item.name,
          quantityChange: asNumber(fields.quantity, 0) - oldQty,
          unit: item.unit,
          beforeSnapshot: before,
          afterSnapshot: after
        });
      } else {
        const newBatch = {
          id: uid("batch"),
          householdId: state.householdId,
          userId: state.userId,
          quantity: asNumber(fields.quantity, 0),
          purchaseDate: fields.purchaseDate || todayISO(),
          expiryDate: fields.expiryDate || "",
          location: fields.location || item.location || "",
          notes: fields.notes || "",
          createdAt: nowISO(),
          updatedAt: nowISO()
        };
        item.batches.push(newBatch);
        syncItemQty(item);
        const after = snapshotForUndo();
        addLog({
          rawInput: "新增批次表单",
          parsedResult: newBatch,
          action: "addBatch",
          itemId: item.id,
          itemName: item.name,
          quantityChange: asNumber(newBatch.quantity, 0),
          unit: item.unit,
          beforeSnapshot: before,
          afterSnapshot: after
        });
      }

      saveState();
      ensureAutoShoppingList();
      closeModal();
      render();
      toast("已保存批次");
    };
  }

  function deleteItem(itemId) {
    const item = getItemById(itemId);
    if (!item) return;
    if (!confirm(`确定删除“${item.name}”吗？`)) return;
    const before = snapshotForUndo();
    state.items = state.items.filter(row => row.id !== itemId);
    state.shoppingList = state.shoppingList.filter(row => row.itemId !== itemId);
    const after = snapshotForUndo();
    addLog({
      rawInput: "删除物品",
      parsedResult: { item },
      action: "deleteItem",
      itemId: item.id,
      itemName: item.name,
      quantityChange: -totalQty(item),
      unit: item.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
    render();
    toast("已删除");
  }

  function deleteBatch(itemId, batchId) {
    const item = getItemById(itemId);
    if (!item) return;
    const batch = getBatchById(item, batchId);
    if (!batch) return;
    if (!confirm("确定删除这个批次吗？")) return;

    const before = snapshotForUndo();
    item.batches = (item.batches || []).filter(row => row.id !== batchId);
    syncItemQty(item);
    const after = snapshotForUndo();
    addLog({
      rawInput: "删除批次",
      parsedResult: { batch },
      action: "deleteBatch",
      itemId: item.id,
      itemName: item.name,
      quantityChange: -asNumber(batch.quantity, 0),
      unit: item.unit,
      beforeSnapshot: before,
      afterSnapshot: after
    });
    saveState();
    render();
    toast("已删除批次");
  }

  function quickAdjust(itemId, action) {
    const item = getItemById(itemId);
    if (!item) return;
    const qtyRaw = prompt(`${action === "add" ? "增加" : "减少"}多少${item.unit || ""}？`, "1");
    if (qtyRaw === null) return;
    const qty = asNumber(qtyRaw, 0);
    if (qty <= 0) return alert("数量必须大于 0");
    try {
      if (action === "add") {
        const expiryDate = prompt("过期日期，可留空，格式 YYYY-MM-DD", "");
        addStock(item, qty, { unit: item.unit, expiryDate: expiryDate || "", rawInput: `手动增加 ${qty}${item.unit || ""}`, parsedResult: { source: "quickAdjust" }, action: "add" });
      } else {
        reduceStockFEFO(item, qty, { rawInput: `手动减少 ${qty}${item.unit || ""}`, parsedResult: { source: "quickAdjust" }, action: "reduce" });
      }
      render();
      toast("已更新库存");
    } catch (err) {
      alert(err.message || err);
    }
  }

  function setShoppingStatus(id, status) {
    const row = state.shoppingList.find(item => item.id === id);
    if (!row) return;
    row.status = status;
    row.updatedAt = nowISO();
    saveState();
    render();
  }

  function deleteShopping(id) {
    state.shoppingList = state.shoppingList.filter(row => row.id !== id);
    saveState();
    render();
  }

  function markShoppingBought(id) {
    const row = state.shoppingList.find(item => item.id === id);
    if (!row) return;

    let item = row.itemId ? getItemById(row.itemId) : null;
    if (!item) {
      const candidates = findItemCandidates(row.itemName);
      item = candidates.exact || null;
    }

    if (!item) {
      if (!confirm(`没有找到“${row.itemName}”对应的库存物品。现在创建吗？`)) return;
      item = createItemFromFields({
        name: row.itemName,
        aliases: "",
        category: "其他",
        brand: "",
        spec: "",
        unit: row.unit || "",
        currentQuantity: 0,
        minStock: 0,
        expiryReminderDays: 7,
        expiryReminderEnabled: true,
        location: "",
        barcode: "",
        notes: "由购物清单创建"
      });
      row.itemId = item.id;
    }

    const qtyRaw = prompt("这次买了多少？", formatQty(row.suggestedQuantity || 1));
    if (qtyRaw === null) return;
    const qty = asNumber(qtyRaw, 0);
    if (qty <= 0) return alert("数量必须大于 0");
    const expiryDate = prompt("过期日期，可留空，格式 YYYY-MM-DD", "");

    try {
      addStock(item, qty, {
        unit: row.unit || item.unit,
        expiryDate: expiryDate || "",
        rawInput: `购物清单标记已买：${row.itemName}`,
        parsedResult: row,
        action: "shoppingBought"
      });
      row.status = "已买";
      row.updatedAt = nowISO();
      saveState();
      render();
      toast("已转入库存");
    } catch (err) {
      alert(err.message || err);
    }
  }

  function undoLatest() {
    const latest = state.logs.find(log => log.action !== "undo" && !log.undone && log.undoStateBefore);
    if (!latest) return;
    if (!confirm(`撤销最近一次操作：${latest.actionLabel || latest.action}？`)) return;

    const before = snapshotForUndo();
    state.items = clone(latest.undoStateBefore.items || []);
    state.shoppingList = clone(latest.undoStateBefore.shoppingList || []);
    latest.undone = true;
    latest.undoneAt = nowISO();
    addLog({
      rawInput: "撤销最近一次操作",
      parsedResult: { undoneLogId: latest.id },
      action: "undo",
      itemId: latest.itemId,
      itemName: latest.itemName,
      quantityChange: -asNumber(latest.quantityChange, 0),
      unit: latest.unit,
      beforeSnapshot: before,
      afterSnapshot: snapshotForUndo()
    });
    saveState();
    render();
    toast("已撤销");
  }

  function toast(message) {
    const el = $("#toast");
    el.textContent = message;
    el.classList.add("show");
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove("show"), 1800);
  }

  function navigate(section) {
    $$(".section").forEach(el => el.classList.remove("active"));
    $(`#section-${section}`).classList.add("active");
    $$(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.nav === section));
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function initSpeech() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const voiceBtn = $("#voiceBtn");

    if (!SpeechRecognition) {
      $("#speechStatus").textContent = "浏览器不支持语音";
      voiceBtn.style.display = "none";
      return;
    }

    $("#speechStatus").textContent = "支持语音";
    recognition = new SpeechRecognition();
    recognition.lang = "zh-CN";
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onresult = event => {
      const text = Array.from(event.results).map(result => result[0]?.transcript || "").join("");
      if (text) $("#quickText").value = text;
      voiceBtn.classList.remove("pressing");
    };
    recognition.onerror = () => {
      voiceBtn.classList.remove("pressing");
      toast("语音识别失败，可改用文字输入");
    };
    recognition.onend = () => voiceBtn.classList.remove("pressing");

    const start = event => {
      event.preventDefault();
      try {
        voiceBtn.classList.add("pressing");
        recognition.start();
      } catch (err) {
        voiceBtn.classList.remove("pressing");
      }
    };

    const stop = event => {
      event.preventDefault();
      try { recognition.stop(); } catch (err) {}
      voiceBtn.classList.remove("pressing");
    };

    voiceBtn.addEventListener("mousedown", start);
    voiceBtn.addEventListener("touchstart", start, { passive: false });
    voiceBtn.addEventListener("mouseup", stop);
    voiceBtn.addEventListener("mouseleave", stop);
    voiceBtn.addEventListener("touchend", stop, { passive: false });
  }

  function bindEvents() {
    $("#parseBtn").onclick = () => {
      const parsed = parseQuickInput($("#quickText").value);
      if (!parsed) return toast("请先输入一句库存变化");
      pendingParse = parsed;
      renderConfirm(parsed);
    };

    $("#clearQuickBtn").onclick = () => {
      $("#quickText").value = "";
      $("#confirmArea").innerHTML = "";
      pendingParse = null;
    };

    $("#addItemBtn").onclick = () => openItemModal();
    $("#manualShoppingBtn").onclick = () => openManualShoppingModal();
    $("#undoBtn").onclick = undoLatest;

    $("#categoryFilter").onchange = renderInventory;
    $("#filterLow").onchange = renderInventory;
    $("#filterExpiring").onchange = renderInventory;
    $("#filterExpired").onchange = renderInventory;

    $$(".nav-btn").forEach(btn => btn.onclick = () => navigate(btn.dataset.nav));
    $$("[data-nav]").forEach(btn => {
      if (!btn.classList.contains("nav-btn")) {
        btn.onclick = () => {
          const target = btn.dataset.nav;
          navigate(target);
          if (btn.dataset.filter === "low") $("#filterLow").checked = true;
          if (btn.dataset.filter === "expiring") $("#filterExpiring").checked = true;
          if (btn.dataset.filter === "expired") $("#filterExpired").checked = true;
          renderInventory();
        };
      }
    });

    $("#modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closeModal();
    });

    $("#clearDataBtn").onclick = () => {
      if (!confirm("确定清空所有本地数据吗？此操作不可撤销。")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = loadState();
      expandedItems = new Set();
      render();
      toast("已清空");
    };
  }

  function openManualShoppingModal() {
    const itemOptions = state.items.map(item => `<option value="${item.id}">${escapeHtml(item.name)}</option>`).join("");
    openModal(`
      <h2>手动加入购物清单</h2>
      <form id="manualShoppingForm" class="grid">
        <label>选择已有物品
          <select name="itemId">
            <option value="">不选择，手动输入名称</option>
            ${itemOptions}
          </select>
        </label>
        <label>物品名称<input name="itemName" placeholder="如：洗衣液"></label>
        <div class="grid two">
          <label>建议购买数量<input name="suggestedQuantity" type="number" step="0.01" min="0" value="1"></label>
          <label>单位<input name="unit" placeholder="瓶 / 包 / 个"></label>
        </div>
        <label>原因<input name="reason" value="手动加入"></label>
        <div class="row wrap">
          <button class="primary" type="submit">加入</button>
          <button class="ghost" type="button" id="modalCancelBtn">取消</button>
        </div>
      </form>
    `);
    $("#modalCancelBtn").onclick = closeModal;
    $("#manualShoppingForm").onsubmit = event => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const item = form.get("itemId") ? getItemById(form.get("itemId")) : null;
      const itemName = String(form.get("itemName") || "").trim();
      if (!item && !itemName) return alert("请选择物品或填写物品名称");
      addToShoppingList({
        item,
        itemName,
        suggestedQuantity: form.get("suggestedQuantity"),
        unit: form.get("unit"),
        reason: form.get("reason") || "手动加入"
      });
      closeModal();
      render();
      toast("已加入购物清单");
    };
  }

  function bootstrap() {
    bindEvents();
    initSpeech();
    render();
  }

  bootstrap();
})();
</script>
</body>
</html>
